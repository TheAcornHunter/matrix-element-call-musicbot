# Copy to config/config.toml

# ==============================
# HARD REQUIREMENT TO RUN
# ==============================
[matrix]
homeserver = "https://matrix.example.org"
user_id = "@musicbot:example.org"
access_token = "YOUR_MATRIX_ACCESS_TOKEN"


# ==============================
# OPTIONAL SETTINGS
# ==============================
[bot]
name = "Music Bot"
history_limit = 10
auto_accept_invites = false

[paths]
audio_dir = "/tmp/musicbot_audio"
saved_queues_file = "data/saved_queues.json"

[audio]
# Cache modes:
# - always_delete: no persistent cache, files removed after playback/on shutdown
# - never_delete: keep all downloaded files
# - size_lru: keep cache up to cache_max_bytes, evict oldest when over limit
cache_mode = "size_lru" # always_delete | never_delete | size_lru
cache_max_bytes = 1073741824 # 1GB default, minimum 200MB in size_lru
cache_delete_after_playback = false
cache_delete_on_shutdown = true
search_mode = "fast" # fast | accurate
search_timeout_seconds = 8.0
extractor_retries = 1
download_format = "wav" # wav | mp3 | ogg(vorbis) | m4a | opus
audio_quality = "best" # best | medium | worst
stream_first_idle = true
stream_prefetch_current = true
stream_retry_to_file_on_fail = true
# ytdlp_cookies_file = "config/cookies.txt"  # Path to a Netscape-format cookies file for yt-dlp (e.g. to bypass YouTube bot checks)

auto_advance_buffer = 2.0
preroll_silence = 1.0
normalize_audio = false
fade_in_ms = 120
volume_percent = 100 # 0-200

[audio.ducking]
# Auto-lower music while other participants are speaking.
enabled = false
# Target playback volume while ducking (percent of normal output gain, clamped 0-200).
duck_to_percent = 35
# Fade-down speed when speech is detected.
attack_ms = 120
# Fade-up speed after speech ends and hold expires.
release_ms = 500
# Keep ducking active briefly after speech stops to avoid rapid toggling.
hold_ms = 250
# Energy threshold for fallback PCM-based speech detection (normalized 0.0-1.0).
vad_threshold = 0.015
# Number of simultaneously active non-bot speakers needed to trigger ducking.
min_active_speakers = 1

[worker]
max_restart_attempts = 3
heartbeat_interval_seconds = 10.0
skip_cooldown_seconds = 1.0
stop_timeout_restart_threshold = 2
membership_mode = "legacy" # legacy | matrix2_auto | matrix2
log_max_bytes = 2000000
log_backups = 5

[playlist]
max_tracks_per_request = 50
background_load_concurrency = 4

[logging]
file = "logs/musicbot.log"
clean_enabled = true
clean_file = "logs/musicbot.clean.log"
clean_filter_matrixrtc_noise = true
max_bytes = 2000000
backups = 5

[ui]
show_progress_messages = false
rich_formatting = false
quiet_mode = true
